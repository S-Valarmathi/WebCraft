<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rebeccapurple;
        }

        .outer-box {
            width: 500px;
            height: 300px;
            border: 2px solid black;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: mediumpurple;
        }

        .inner-box {
            width: 350px;
            height: 180px;
            border: 2px solid black;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: lavender;
        }

        h2 {
            margin-bottom: 20px;
        }

        button {
            width: 100px;
            height: 40px;
            border-radius: 20px;
            background-color: darkviolet;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="outer-box">
        <div class="inner-box">
            <h2>My name is Valarmathi</h2>
            <button>Follow</button>
        </div>
    </div>

</body>
</html>
